<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSYCH PROFILER — Not A Safe Space</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&family=JetBrains+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080808;
    --bg2: #0a0a0a;
    --bg3: #0d0d0d;
    --border: #111111;
    --border2: #0f0f0f;
    --red: #d42b2b;
    --red-glow: rgba(212,43,43,0.2);
    --text: #d0d0d0;
    --text-dim: #888;
    --text-muted: #444;
    --text-ghost: #222;
    --mono: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
    --display: 'Big Shoulders Display', Impact, 'Arial Black', sans-serif;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--mono); }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    position: relative;
  }

  /* Red spine */
  body::before {
    content: '';
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--red);
    z-index: 100;
  }

  /* ── HEADER ── */
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: #050505;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .header-left { display: flex; align-items: baseline; gap: 14px; }
  .header-title {
    font-family: var(--display);
    font-size: 28px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 3px;
    line-height: 1;
  }
  .header-sub { font-size: 8px; color: var(--red); letter-spacing: 4px; text-transform: uppercase; }
  .header-right { font-size: 8px; color: #141414; letter-spacing: 2px; text-align: right; line-height: 1.8; }

  /* ── INPUT ZONE ── */
  .input-zone {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .input-label { font-size: 8px; color: var(--text-ghost); letter-spacing: 4px; margin-bottom: 10px; }
  .input-row { display: flex; gap: 8px; }
  .input-wrap { flex: 1; position: relative; }
  .input-arrow {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--red);
    font-size: 16px;
    line-height: 1;
    pointer-events: none;
  }
  #topic-input {
    width: 100%;
    background: #0c0c0c;
    border: 1px solid #141414;
    border-radius: 2px;
    padding: 12px 14px 12px 28px;
    color: #ddd;
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    caret-color: var(--red);
    transition: border-color 0.15s;
  }
  #topic-input:focus { border-color: rgba(212,43,43,0.3); }
  #topic-input::placeholder { color: #252525; }
  #analyze-btn {
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 2px;
    padding: 12px 24px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    min-width: 100px;
    transition: background 0.15s;
  }
  #analyze-btn:hover { background: #b82222; }
  #analyze-btn:disabled { background: #0c0c0c; color: #222; cursor: not-allowed; }
  .error-msg { margin-top: 8px; font-size: 10px; color: var(--red); letter-spacing: 2px; }

  /* ── LOADING ── */
  #loading {
    flex: 1;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
  }
  .loading-word {
    font-family: var(--display);
    font-size: 80px;
    color: #0e0e0e;
    letter-spacing: 8px;
    user-select: none;
    line-height: 1;
  }
  .loading-msg { font-size: 9px; color: var(--red); letter-spacing: 5px; min-height: 16px; }
  .scan-bar {
    width: 280px;
    height: 1px;
    background: #111;
    position: relative;
    overflow: hidden;
  }
  .scan-bar::after {
    content: '';
    position: absolute;
    height: 100%;
    width: 38%;
    background: var(--red);
    animation: scan 1.1s ease-in-out infinite;
  }
  @keyframes scan { from { left: -40% } to { left: 110% } }

  /* ── EMPTY STATE ── */
  #empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .empty-word {
    font-family: var(--display);
    font-size: 100px;
    color: #0c0c0c;
    letter-spacing: 10px;
    user-select: none;
    line-height: 1;
  }
  .empty-hint { font-size: 8px; color: #161616; letter-spacing: 6px; }

  /* ── RESULTS ── */
  #results { flex: 1; display: none; flex-direction: column; overflow: hidden; }

  /* Driver strip */
  .driver-strip {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .interpreted-label { width: 100%; font-size: 8px; color: #282828; letter-spacing: 3px; margin-bottom: 4px; }
  .driver-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border-radius: 2px;
    padding: 5px 12px;
    font-size: 9px;
    letter-spacing: 3px;
    font-family: var(--mono);
  }
  .driver-dot { width: 5px; height: 5px; border-radius: 50%; }
  .q-count { margin-left: auto; font-size: 8px; color: #181818; letter-spacing: 2px; }

  /* Tabs */
  .tab-bar {
    padding-left: 24px;
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tab-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: #252525;
    padding: 12px 18px;
    font-family: var(--mono);
    font-size: 8px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: color 0.1s, border-color 0.1s;
  }
  .tab-btn.active { color: #e0e0e0; }

  /* Content area */
  .tab-content { display: none; padding: 24px; overflow-y: auto; flex: 1; }
  .tab-content.active { display: block; }

  /* Psych grid */
  .psych-grid { display: grid; gap: 12px; grid-template-columns: repeat(3, 1fr); }
  .block {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 2px;
    padding: 16px 18px;
    animation: fadeIn 0.3s ease both;
  }
  .block.span2 { grid-column: span 2; }
  .block.full { grid-column: 1 / -1; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .block-label { font-size: 8px; color: var(--text-ghost); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 10px; }
  .block-value { font-size: 12px; color: var(--text-dim); line-height: 1.8; }

  /* Secret belief block */
  .belief-block {
    grid-column: 1 / -1;
    background: #0b0707;
    border: 1px solid #1a0909;
    border-left: 3px solid var(--red);
    border-radius: 2px;
    padding: 18px 22px;
    animation: fadeIn 0.4s ease both;
  }
  .belief-label { font-size: 8px; color: var(--red); letter-spacing: 4px; margin-bottom: 12px; }
  .belief-text { font-size: 13px; color: #bbb; line-height: 1.85; font-style: italic; }

  /* Chat tells */
  .tells-block { grid-column: 1 / -1; background: var(--bg2); border: 1px solid var(--border2); border-radius: 2px; padding: 18px 22px; }
  .tells-label { font-size: 8px; color: #282828; letter-spacing: 4px; margin-bottom: 16px; }
  .tells-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .tell-item { border-left: 2px solid var(--border); padding-left: 12px; }
  .tell-num { font-size: 8px; color: #282828; letter-spacing: 3px; margin-bottom: 6px; }
  .tell-text { font-size: 12px; color: #777; line-height: 1.65; }

  /* Framing window */
  .fw-bar-track { height: 2px; background: #0d0d0d; border-radius: 1px; overflow: hidden; margin-bottom: 10px; }
  .fw-bar-fill { height: 100%; width: 0; border-radius: 1px; transition: width 1s ease; }

  /* Driver breakdown */
  .driver-breakdown { grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .driver-detail {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-left: 2px solid var(--border);
    border-radius: 2px;
    padding: 14px 16px;
  }
  .driver-detail-label { font-size: 8px; letter-spacing: 3px; margin-bottom: 8px; }
  .driver-detail-text { font-size: 11px; color: #666; line-height: 1.7; }

  /* ── QUESTIONS TAB ── */
  .q-header { font-size: 8px; color: #1c1c1c; letter-spacing: 4px; margin-bottom: 18px; }
  .q-list { display: grid; gap: 5px; }
  .q-row {
    background: #090909;
    border: 1px solid var(--border2);
    border-radius: 2px;
    padding: 15px 18px;
    cursor: pointer;
    display: flex;
    gap: 18px;
    align-items: flex-start;
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.25s ease both;
    transition: background 0.12s, border-color 0.12s;
  }
  .q-row:hover { background: #0e0e0e; border-color: #1a1a1a; }
  .q-accent {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .q-row:hover .q-accent { opacity: 1; }
  .q-row.copied .q-accent { opacity: 1; }
  .q-num { font-size: 8px; min-width: 26px; padding-top: 3px; letter-spacing: 1px; }
  .q-body { flex: 1; }
  .q-text { font-size: 13px; color: #c8c8c8; line-height: 1.6; margin-bottom: 0; }
  .q-desc { font-size: 9px; color: #222; letter-spacing: 1px; margin-top: 7px; }
  .q-copy { font-size: 8px; letter-spacing: 2px; color: #141414; min-width: 44px; text-align: right; padding-top: 3px; transition: color 0.2s; }
  .q-row:hover .q-copy { color: #333; }
  .q-row.copied .q-copy { color: #1a9e5c !important; }

  /* ── RAW TAB ── */
  #raw-output {
    background: #090909;
    border: 1px solid var(--border2);
    border-radius: 2px;
    padding: 22px;
    font-size: 10px;
    line-height: 1.9;
    color: #333;
    white-space: pre-wrap;
    word-break: break-word;
    font-family: var(--mono);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #1a1a1a; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-left">
    <span class="header-title">PSYCH PROFILER</span>
    <span class="header-sub">NOT A SAFE SPACE</span>
  </div>
  <div class="header-right">MIRROR MODE v2.0<br>FRANKLIN INTEL SYS</div>
</header>

<!-- INPUT -->
<div class="input-zone">
  <div class="input-label">// ENTER DEBATE TOPIC — PRESS ENTER</div>
  <div class="input-row">
    <div class="input-wrap">
      <span class="input-arrow">›</span>
      <input id="topic-input" type="text" placeholder="e.g. men have it harder than women today" />
    </div>
    <button id="analyze-btn">ANALYZE</button>
  </div>
  <div class="error-msg" id="error-msg" style="display:none;"></div>
</div>

<!-- EMPTY STATE -->
<div id="empty">
  <div class="empty-word">NASS</div>
  <div class="empty-hint">ENTER A TOPIC ABOVE TO BEGIN</div>
</div>

<!-- LOADING -->
<div id="loading">
  <div class="loading-word">READING</div>
  <div class="loading-msg" id="loading-msg">SCANNING AUDIENCE PSYCHOLOGY</div>
  <div class="scan-bar"></div>
</div>

<!-- RESULTS -->
<div id="results">

  <!-- Driver strip -->
  <div class="driver-strip" id="driver-strip">
    <div class="interpreted-label" id="interpreted-label" style="display:none;"></div>
    <div id="primary-badge" class="driver-badge"></div>
    <div id="secondary-badge" class="driver-badge" style="display:none;"></div>
    <div class="q-count" id="q-count"></div>
  </div>

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="psych">01 / PSYCH BREAKDOWN</button>
    <button class="tab-btn" data-tab="questions">02 / MIRROR MODE</button>
    <button class="tab-btn" data-tab="raw">03 / RAW</button>
  </div>

  <!-- PSYCH TAB -->
  <div class="tab-content active" id="tab-psych">
    <div class="psych-grid" id="psych-grid">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- QUESTIONS TAB -->
  <div class="tab-content" id="tab-questions">
    <div class="q-header">// CLICK ANY QUESTION TO COPY — DEPLOY IN ORDER</div>
    <div class="q-list" id="q-list"></div>
  </div>

  <!-- RAW TAB -->
  <div class="tab-content" id="tab-raw">
    <pre id="raw-output"></pre>
  </div>

</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────────────────
const SYSTEM_PROMPT = `You are the Audience Psychology Profiler + Franklin Mirror Mode engine for "Not A Safe Space" — a TikTok Live debate show hosted by Franklin (also known as Cuervo). You have two jobs in one call.

You have studied hundreds of hours of Franklin's live transcripts. You know his voice: blunt, rhythmic, slightly confrontational, never apologetic, always in control. He speaks in short punches. He names things other hosts avoid. He asks questions that sound rhetorical but aren't. He doesn't let guests off the hook. He narrows the frame until there's no exit.

When given a debate topic, produce BOTH sections below. Do not skip any field. Do not add filler. Every field must be specific to the topic — no generic answers.

---

SECTION 1: PSYCHOLOGICAL BREAKDOWN

PRIMARY DRIVER: [Identity Threat / Status Anxiety / Tribal Affiliation / Fear of Judgment / Cognitive Dissonance] — [One sentence: why this is the dominant mechanism for THIS topic with THIS audience]

SECONDARY DRIVER: [Same options or None] — [One sentence]

ACTIVATION TRIGGER: [Exactly what makes this topic hit the 18–35 TikTok Live audience RIGHT NOW. Not "people care about this" — specific. Name the demographic, the wound, and the timing.]

ARRIVAL STATE: [What emotional posture does the audience arrive in? Are they already on a side? Defensive? Split? One sentence. Specific.]

WHAT THEY SECRETLY BELIEVE BUT WON'T SAY OUT LOUD: [The private position the audience holds that they'll never admit publicly. Make it specific, uncomfortable, and true. Two to three sentences.]

CHAT TELLS TO WATCH:
- Tell 1: [Specific chat signal that confirms which driver is active]
- Tell 2: [Specific chat signal]
- Tell 3: [Specific chat signal]

EXPLOITATION MOVE: [The single most effective Franklin move type given the primary driver. Name the move and one sentence on how to deploy it for this specific topic.]

FRAMING WINDOW: [Short = under 3 min / Medium = 3–7 min / Long = 7+ min] — [One sentence on why]

---

SECTION 2: FRANKLIN MIRROR MODE — 15 LIVE QUESTIONS

Generate exactly 15 questions written in Franklin's voice. Designed to corner, expose, or force a choice.

Franklin's question patterns:
- "So you're telling me X. Why would anyone believe that?"
- "That's not the real reason. What's the actual reason?"
- "I'm not asking about [deflection]. I'm asking about [real topic]."
- "It's one or the other. Which is it?"
- "Chat — is anyone buying that answer?"
- "You said [X]. You mean [Y]. Say [Y]."
- "So you agree with me. You just don't want to say it that way."

Format each as:
Q[number]: [The question]
[One line: what this question exposes or forces]

Q1 through Q15. No groups. No labels. Deployment order.

---

OUTPUT RULES:
- No preamble. Start with SECTION 1.
- No closing summary. No affirmations.
- If vague, interpret as most charged version: TOPIC INTERPRETED AS: [interpretation]
- Every answer specific. Generic = wrong.`;

const DRIVER_META = {
  "Identity Threat":      { color: "#d42b2b", pulse: "rgba(212,43,43,0.18)" },
  "Status Anxiety":       { color: "#d4802b", pulse: "rgba(212,128,43,0.18)" },
  "Tribal Affiliation":   { color: "#7c3aed", pulse: "rgba(124,58,237,0.18)" },
  "Fear of Judgment":     { color: "#1a8fc7", pulse: "rgba(26,143,199,0.18)" },
  "Cognitive Dissonance": { color: "#1a9e5c", pulse: "rgba(26,158,92,0.18)" },
};

const LOAD_MSGS = ["SCANNING AUDIENCE PSYCHOLOGY","MAPPING TRIBAL VECTORS","EXTRACTING BURIED BELIEF","LOADING MIRROR MODE"];

// ── STATE ───────────────────────────────────────────────────────────────────
let loadInterval = null;
let loadPhase = 0;
let currentPrimaryColor = "#d42b2b";
let parsed = null;

// ── ELEMENTS ────────────────────────────────────────────────────────────────
const topicInput = document.getElementById('topic-input');
const analyzeBtn = document.getElementById('analyze-btn');
const errorMsg   = document.getElementById('error-msg');
const emptyEl    = document.getElementById('empty');
const loadingEl  = document.getElementById('loading');
const resultsEl  = document.getElementById('results');
const loadMsgEl  = document.getElementById('loading-msg');

// ── TABS ────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.remove('active');
      b.style.borderBottomColor = 'transparent';
      b.style.color = '#252525';
    });
    btn.classList.add('active');
    btn.style.borderBottomColor = currentPrimaryColor;
    btn.style.color = '#e0e0e0';
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
  });
});

// ── INPUT HANDLERS ──────────────────────────────────────────────────────────
topicInput.addEventListener('keydown', e => { if (e.key === 'Enter') runAnalysis(); });
analyzeBtn.addEventListener('click', runAnalysis);

// ── PARSE ────────────────────────────────────────────────────────────────────
function parseResponse(raw) {
  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  const out = {
    topicInterpreted: null,
    primaryDriver: null, primaryDriverText: null,
    secondaryDriver: null, secondaryDriverText: null,
    activationTrigger: null, arrivalState: null,
    secretBelief: null, chatTells: [],
    exploitationMove: null, framingWindow: null,
    questions: [],
  };
  let inS2 = false, tells = [];
  for (let i = 0; i < lines.length; i++) {
    const l = lines[i];
    if (l.startsWith('TOPIC INTERPRETED AS:')) { out.topicInterpreted = l.replace('TOPIC INTERPRETED AS:','').trim(); continue; }
    if (l.startsWith('SECTION 2')) { inS2 = true; continue; }
    if (!inS2) {
      const pd = (key) => {
        const rest = l.replace(key,'').trim();
        const d = rest.indexOf('—');
        return { main: d > -1 ? rest.slice(0,d).trim() : rest, sub: d > -1 ? rest.slice(d+1).trim() : null };
      };
      if (l.startsWith('PRIMARY DRIVER:')) { const p = pd('PRIMARY DRIVER:'); out.primaryDriver = p.main; out.primaryDriverText = p.sub; }
      else if (l.startsWith('SECONDARY DRIVER:')) { const p = pd('SECONDARY DRIVER:'); out.secondaryDriver = p.main; out.secondaryDriverText = p.sub; }
      else if (l.startsWith('ACTIVATION TRIGGER:')) out.activationTrigger = l.replace('ACTIVATION TRIGGER:','').trim();
      else if (l.startsWith('ARRIVAL STATE:')) out.arrivalState = l.replace('ARRIVAL STATE:','').trim();
      else if (l.startsWith('WHAT THEY SECRETLY')) {
        let belief = l.includes(':') ? l.split(':').slice(1).join(':').trim() : '';
        let j = i + 1;
        while (j < lines.length && !lines[j].match(/^(CHAT TELLS|EXPLOITATION|FRAMING|SECTION|Q\d+:|-\sTell)/)) { belief += ' ' + lines[j]; j++; }
        out.secretBelief = belief.trim(); i = j - 1;
      } else if (l.match(/^-\s*Tell\s*\d+:/i)) { tells.push(l.replace(/^-\s*Tell\s*\d+:\s*/i,'').trim()); out.chatTells = [...tells]; }
      else if (l.startsWith('EXPLOITATION MOVE:')) out.exploitationMove = l.replace('EXPLOITATION MOVE:','').trim();
      else if (l.startsWith('FRAMING WINDOW:')) out.framingWindow = l.replace('FRAMING WINDOW:','').trim();
    } else {
      const m = l.match(/^Q(\d+):\s*(.+)/);
      if (m) {
        const desc = lines[i+1] && !lines[i+1].match(/^Q\d+:/) ? lines[i+1] : null;
        if (desc) i++;
        out.questions.push({ num: parseInt(m[1]), question: m[2], descriptor: desc });
      }
    }
  }
  return out;
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderResults(data, raw) {
  parsed = data;
  document.getElementById('raw-output').textContent = raw;

  const dm = data.primaryDriver ? (DRIVER_META[data.primaryDriver] || DRIVER_META['Identity Threat']) : null;
  const dm2 = data.secondaryDriver && data.secondaryDriver !== 'None' ? (DRIVER_META[data.secondaryDriver] || null) : null;

  currentPrimaryColor = dm ? dm.color : '#d42b2b';

  // Update active tab border color
  document.querySelectorAll('.tab-btn.active').forEach(b => b.style.borderBottomColor = currentPrimaryColor);

  // Driver strip
  if (data.topicInterpreted) {
    const il = document.getElementById('interpreted-label');
    il.textContent = 'INTERPRETED AS: ' + data.topicInterpreted;
    il.style.display = 'block';
  }
  const pb = document.getElementById('primary-badge');
  if (dm) {
    pb.style.border = `1px solid ${dm.color}`;
    pb.style.boxShadow = `0 0 14px ${dm.pulse}`;
    pb.innerHTML = `<div class="driver-dot" style="background:${dm.color};box-shadow:0 0 6px ${dm.color}"></div><span style="color:${dm.color}">${data.primaryDriver.toUpperCase()}</span>`;
  }
  const sb = document.getElementById('secondary-badge');
  if (dm2) {
    sb.style.display = 'inline-flex';
    sb.style.border = '1px solid #161616';
    sb.innerHTML = `<div class="driver-dot" style="background:${dm2.color};opacity:0.5"></div><span style="color:#333">${data.secondaryDriver.toUpperCase()}</span>`;
  }
  document.getElementById('q-count').textContent = data.questions.length + ' QUESTIONS LOADED';

  // Psych grid
  const grid = document.getElementById('psych-grid');
  grid.innerHTML = '';
  const accentColor = dm ? dm.color : '#222';

  // Activation Trigger
  grid.appendChild(makeBlock('ACTIVATION TRIGGER', data.activationTrigger, 'span2', accentColor));
  // Arrival State
  grid.appendChild(makeBlock('ARRIVAL STATE', data.arrivalState, '', '#222'));

  // Secret belief
  const bb = document.createElement('div');
  bb.className = 'belief-block';
  bb.style.borderLeftColor = accentColor;
  bb.innerHTML = `<div class="belief-label" style="color:${accentColor}">▸ WHAT THEY WON'T SAY OUT LOUD</div><div class="belief-text">${data.secretBelief || '—'}</div>`;
  grid.appendChild(bb);

  // Chat tells
  const tells = data.chatTells.length ? data.chatTells : ['—','—','—'];
  const tb = document.createElement('div');
  tb.className = 'tells-block';
  tb.innerHTML = `<div class="tells-label">CHAT TELLS TO WATCH IN REAL TIME</div><div class="tells-grid">${tells.slice(0,3).map((t,i)=>`<div class="tell-item" style="border-left-color:${i===0?accentColor:'#141414'}"><div class="tell-num">0${i+1}</div><div class="tell-text">${t}</div></div>`).join('')}</div>`;
  grid.appendChild(tb);

  // Exploitation move
  grid.appendChild(makeBlock('EXPLOITATION MOVE', data.exploitationMove, 'span2', ''));

  // Framing window
  const fw = data.framingWindow || '';
  const fwColor = fw.toLowerCase().includes('short') ? '#d42b2b' : fw.toLowerCase().includes('medium') ? '#d4802b' : '#1a9e5c';
  const fwPct = fw.toLowerCase().includes('short') ? 28 : fw.toLowerCase().includes('medium') ? 55 : 82;
  const fwBlock = document.createElement('div');
  fwBlock.className = 'block';
  fwBlock.innerHTML = `<div class="block-label">FRAMING WINDOW</div><div class="fw-bar-track"><div class="fw-bar-fill" id="fw-fill" style="background:${fwColor};box-shadow:0 0 8px ${fwColor}66"></div></div><div class="block-value" style="color:${fwColor}">${fw || '—'}</div>`;
  grid.appendChild(fwBlock);
  setTimeout(() => { const f = document.getElementById('fw-fill'); if (f) f.style.width = fwPct + '%'; }, 100);

  // Driver details
  if (data.primaryDriverText || (data.secondaryDriverText && data.secondaryDriver !== 'None')) {
    const dd = document.createElement('div');
    dd.className = 'driver-breakdown';
    if (data.primaryDriverText) {
      dd.innerHTML += `<div class="driver-detail" style="border-left-color:${accentColor}"><div class="driver-detail-label" style="color:${accentColor}">PRIMARY / ${(data.primaryDriver||'').toUpperCase()}</div><div class="driver-detail-text">${data.primaryDriverText}</div></div>`;
    }
    if (data.secondaryDriverText && data.secondaryDriver !== 'None') {
      dd.innerHTML += `<div class="driver-detail"><div class="driver-detail-label" style="color:#2a2a2a">SECONDARY / ${(data.secondaryDriver||'').toUpperCase()}</div><div class="driver-detail-text" style="color:#444">${data.secondaryDriverText}</div></div>`;
    }
    grid.appendChild(dd);
  }

  // Questions
  const qList = document.getElementById('q-list');
  qList.innerHTML = '';
  data.questions.forEach((q, idx) => {
    const row = document.createElement('div');
    row.className = 'q-row';
    row.style.animationDelay = (idx * 0.04) + 's';
    row.innerHTML = `
      <div class="q-accent" style="background:${accentColor}"></div>
      <div class="q-num" style="color:${accentColor}">Q${String(q.num).padStart(2,'0')}</div>
      <div class="q-body">
        <div class="q-text">${q.question}</div>
        ${q.descriptor ? `<div class="q-desc">${q.descriptor}</div>` : ''}
      </div>
      <div class="q-copy">COPY</div>
    `;
    row.addEventListener('click', () => {
      navigator.clipboard.writeText(q.question).catch(()=>{});
      row.classList.add('copied');
      row.querySelector('.q-copy').textContent = 'COPIED';
      row.querySelector('.q-copy').style.color = '#1a9e5c';
      setTimeout(() => {
        row.classList.remove('copied');
        row.querySelector('.q-copy').textContent = 'COPY';
        row.querySelector('.q-copy').style.color = '';
      }, 1400);
    });
    qList.appendChild(row);
  });
}

function makeBlock(label, value, extraClass, accentColor) {
  const el = document.createElement('div');
  el.className = 'block' + (extraClass ? ' ' + extraClass : '');
  el.innerHTML = `<div class="block-label" style="${accentColor ? 'color:'+accentColor : ''}">${label}</div><div class="block-value">${value || '—'}</div>`;
  return el;
}

// ── SHOW/HIDE ────────────────────────────────────────────────────────────────
function showLoading() {
  emptyEl.style.display = 'none';
  resultsEl.style.display = 'none';
  loadingEl.style.display = 'flex';
  analyzeBtn.disabled = true;
  loadPhase = 0;
  loadMsgEl.textContent = LOAD_MSGS[0];
  loadInterval = setInterval(() => {
    loadPhase = (loadPhase + 1) % LOAD_MSGS.length;
    loadMsgEl.textContent = LOAD_MSGS[loadPhase];
  }, 850);
}
function showResults() {
  clearInterval(loadInterval);
  loadingEl.style.display = 'none';
  emptyEl.style.display = 'none';
  resultsEl.style.display = 'flex';
  analyzeBtn.disabled = false;
}
function showError(msg) {
  clearInterval(loadInterval);
  loadingEl.style.display = 'none';
  emptyEl.style.display = 'flex';
  analyzeBtn.disabled = false;
  errorMsg.textContent = msg;
  errorMsg.style.display = 'block';
}

// ── MAIN ─────────────────────────────────────────────────────────────────────
async function runAnalysis() {
  const topic = topicInput.value.trim();
  if (!topic) return;
  errorMsg.style.display = 'none';
  showLoading();

  // Reset tabs
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', i === 0);
    b.style.borderBottomColor = i === 0 ? currentPrimaryColor : 'transparent';
    b.style.color = i === 0 ? '#e0e0e0' : '#252525';
  });
  document.querySelectorAll('.tab-content').forEach((c,i) => c.classList.toggle('active', i === 0));
  document.getElementById('interpreted-label').style.display = 'none';
  document.getElementById('secondary-badge').style.display = 'none';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: 'TOPIC: ' + topic }],
      }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const text = (data.content || []).map(b => b.text || '').join('\n');
    const parsed = parseResponse(text);
    renderResults(parsed, text);
    showResults();
  } catch (e) {
    showError('SYSTEM FAILURE — ' + (e.message || 'CHECK CONNECTION').toUpperCase());
  }
}
</script>
